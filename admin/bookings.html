<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookings - D'Rising Sun</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="layout-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header"><i class="fas fa-bus" style="color: var(--accent)"></i> D'Rising Sun</div>
            <nav class="sidebar-nav">
                <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
                <a href="fleet.html"><i class="fas fa-truck-monster"></i> Fleet Management</a>
                <a href="routes.html"><i class="fas fa-route"></i> Routes</a>
                <a href="schedules.html"><i class="fas fa-calendar-alt"></i> Schedules</a>
                <a href="bookings.html" class="active"><i class="fas fa-ticket-alt"></i> Bookings</a>
                <a href="users.html"><i class="fas fa-users"></i> Users</a>
                <a href="incidents.html"><i class="fas fa-exclamation-triangle"></i> Incidents</a>
                <a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="top-header">
                <h2>Booking Management</h2>
                <div class="user-info">
                    <span id="user-name">Loading...</span>
                    <button id="btn-logout" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </header>
            
            <div class="content-area">
                <div class="table-container">
                    <div class="table-header">
                        <h3>All Bookings</h3>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Passenger</th>
                                <th>Route</th>
                                <th>Departure</th>
                                <th>Seat No.</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="bookings-table"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../assets/js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await checkSession('admin');
            loadBookings();
        });

        async function loadBookings() {
            const res = await apiFetch('bookings.php?action=list');
            if (res.success) {
                const tbody = document.getElementById('bookings-table');
                tbody.innerHTML = '';
                res.data.forEach(b => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>#${b.id}</td>
                        <td>${b.passenger_name}</td>
                        <td>${b.origin} to ${b.destination}</td>
                        <td>${new Date(b.departure_time).toLocaleString()}</td>
                        <td>${b.seat_number}</td>
                        <td><span class="badge ${formatStatus(b.status)}">${b.status}</span></td>
                        <td>
                            ${b.status === 'confirmed' ? `<button class="btn btn-danger btn-sm" onclick="cancelBooking(${b.id})">Cancel</button>` : ''}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        async function cancelBooking(id) {
            if (confirm("Are you sure you want to cancel this booking?")) {
                const res = await apiFetch('bookings.php', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, status: 'cancelled' })
                });
                
                if (res.success) {
                    showToast('Booking cancelled', 'success');
                    loadBookings();
                } else {
                    showToast(res.message, 'error');
                }
            }
        }
    </script>
</body>
</html>
