<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users - D'Rising Sun</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="layout-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header"><i class="fas fa-bus" style="color: var(--accent)"></i> D'Rising Sun</div>
            <nav class="sidebar-nav">
                <a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
                <a href="fleet.html"><i class="fas fa-truck-monster"></i> Fleet Management</a>
                <a href="routes.html"><i class="fas fa-route"></i> Routes</a>
                <a href="schedules.html"><i class="fas fa-calendar-alt"></i> Schedules</a>
                <a href="bookings.html"><i class="fas fa-ticket-alt"></i> Bookings</a>
                <a href="users.html" class="active"><i class="fas fa-users"></i> Users</a>
                <a href="incidents.html"><i class="fas fa-exclamation-triangle"></i> Incidents</a>
                <a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a>
            </nav>
        </aside>
        
        <main class="main-content">
            <header class="top-header">
                <h2>User Management</h2>
                <div class="user-info">
                    <span id="user-name">Loading...</span>
                    <button id="btn-logout" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </header>
            
            <div class="content-area">
                <div class="table-container">
                    <div class="table-header">
                        <h3>System Users</h3>
                        <button class="btn btn-primary" onclick="openModal()"><i class="fas fa-plus"></i> Add User</button>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Phone</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="users-table"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Add User</h3>
                <button class="close-modal" onclick="closeModal()">&times;</button>
            </div>
            <form id="userForm">
                <input type="hidden" id="user_id">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="full_name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email_input" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password (leave blank to keep current if editing)</label>
                    <input type="password" id="password_input" class="form-control">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="role" class="form-control" required>
                        <option value="driver">Driver</option>
                        <option value="admin">Admin</option>
                        <option value="passenger">Passenger</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="phone" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="status" class="form-control" required>
                        <option value="active">Active</option>
                        <option value="inactive">Inactive</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">Save User</button>
            </form>
        </div>
    </div>
    
    <script src="../assets/js/main.js"></script>
    <script>
        let users = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await checkSession('admin');
            loadUsers();
        });

        async function loadUsers() {
            const res = await apiFetch('users.php');
            if (res.success) {
                users = res.data;
                const tbody = document.getElementById('users-table');
                tbody.innerHTML = '';
                users.forEach(u => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${u.full_name}</td>
                        <td>${u.email}</td>
                        <td>${u.role}</td>
                        <td>${u.phone}</td>
                        <td><span class="badge ${formatStatus(u.status)}">${u.status}</span></td>
                        <td>
                            <button class="btn btn-accent btn-sm" onclick="editUser(${u.id})">Edit</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        function openModal() {
            document.getElementById('modalTitle').textContent = 'Add User';
            document.getElementById('userForm').reset();
            document.getElementById('user_id').value = '';
            document.getElementById('password_input').required = true;
            document.getElementById('userModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('userModal').classList.remove('active');
        }

        function editUser(id) {
            const u = users.find(x => x.id == id);
            if (u) {
                document.getElementById('modalTitle').textContent = 'Edit User';
                document.getElementById('user_id').value = u.id;
                document.getElementById('full_name').value = u.full_name;
                document.getElementById('email_input').value = u.email;
                document.getElementById('password_input').required = false;
                document.getElementById('role').value = u.role;
                document.getElementById('phone').value = u.phone;
                document.getElementById('status').value = u.status;
                document.getElementById('userModal').classList.add('active');
            }
        }

        document.getElementById('userForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('user_id').value;
            const data = {
                full_name: document.getElementById('full_name').value,
                email: document.getElementById('email_input').value,
                password: document.getElementById('password_input').value,
                role: document.getElementById('role').value,
                phone: document.getElementById('phone').value,
                status: document.getElementById('status').value
            };

            const method = id ? 'PUT' : 'POST';
            if (id) data.id = id;

            const res = await apiFetch('users.php', {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.success) {
                showToast(res.message, 'success');
                closeModal();
                loadUsers();
            } else {
                showToast(res.message, 'error');
            }
        });
    </script>
</body>
</html>
